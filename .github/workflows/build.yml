name: Build Plugin
on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PLUGIN_NAME: Lidarr.Plugin.Diffractarr
  PLUGIN_VERSION: 1.0.0.${{ github.run_number }}
  MINIMUM_LIDARR_VERSION: 3.0.0.4855
  DOTNET_VERSION: 8.0.405

jobs:
  build:
    strategy:
      matrix:
        framework: [ net8.0 ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Create global.json
        run: |
          echo '{"sdk":{"version": "${{ env.DOTNET_VERSION }}"}}' > ./global.json
      - name: Generate metadata
        id: gen_meta
        run: |
          echo "branch=${GITHUB_REF#refs/heads/}" | tr '/' '-'  >> $GITHUB_OUTPUT
      - name: Update version
        run: |
          sed -i'' -e "s/<AssemblyVersion>[0-9.*]\+<\/AssemblyVersion>/<AssemblyVersion>$PLUGIN_VERSION<\/AssemblyVersion>/g" src/Directory.Build.props
          sed -i'' -e "s/<AssemblyConfiguration>[\$()A-Za-z-]\+<\/AssemblyConfiguration>/<AssemblyConfiguration>${{ steps.gen_meta.outputs.branch }}<\/AssemblyConfiguration>/g" src/Directory.Build.props
          sed -i'' -e "s/<AssemblyVersion>[0-9.*]\+<\/AssemblyVersion>/<AssemblyVersion>$MINIMUM_LIDARR_VERSION<\/AssemblyVersion>/g" src/Lidarr/src/Directory.Build.props
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Build
        run: |
          dotnet restore src/*.sln -p:NuGetAudit=false
          dotnet build src/*.sln -c Release -f ${{ matrix.framework }} -p:NuGetAudit=false
      - name: Test
        run: dotnet test src/*.sln -c Release -f ${{ matrix.framework }} --no-build --logger "trx;LogFileName=results.trx"
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}.${{ matrix.framework }}
          path: ./_plugins/${{ matrix.framework }}/${{ env.PLUGIN_NAME }}/${{ env.PLUGIN_NAME }}.*
      - name: Archive build 
        if: github.ref == 'refs/heads/main'
        run: |
          cd _plugins/${{ matrix.framework }}/${{ env.PLUGIN_NAME }}
          zip -j ../../../${{ env.PLUGIN_NAME }}.${{ matrix.framework }}.zip ${{ env.PLUGIN_NAME }}.*
      - name: Publish build
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: ${{ env.PLUGIN_VERSION }}
          name: ${{ env.PLUGIN_VERSION }}
          draft: true
          prerelease: false
          files: |
            ${{ env.PLUGIN_NAME }}.${{ matrix.framework }}.zip
